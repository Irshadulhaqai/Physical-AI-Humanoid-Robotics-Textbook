name: Test Build on PR

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'my-website/**'
      - '.github/workflows/test-build.yml'

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: my-website/package-lock.json

      - name: Install dependencies
        working-directory: my-website
        run: npm ci

      - name: Type check
        working-directory: my-website
        run: npm run typecheck

      - name: Build website
        working-directory: my-website
        run: npm run build

      - name: Check for broken links
        working-directory: my-website
        run: |
          # Build succeeding means no broken internal links (onBrokenLinks: 'throw')
          echo "Build succeeded - no broken links detected"
